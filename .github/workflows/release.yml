name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from templateDetails.xml
        id: version
        run: |
          VERSION=$(grep -oPm1 '(?<=<version>)[^<]+' templateDetails.xml)
          if [ -z "$VERSION" ]; then
            echo "Impossibile leggere <version> da templateDetails.xml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ steps.version.outputs.tag }}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build template zip
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          zip -r "unisal_general-${{ steps.version.outputs.version }}.zip" \
            index.php offline.php component.php error.php common_menu.php \
            templateDetails.xml assets html

      - name: Genera changelog (ultimi 5 commit)
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          {
            echo 'body<<CHANGELOG_EOF'
            echo '## Changelog'
            git log -5 --pretty=format:'- %s (%h)'
            echo
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: unisal_general-${{ steps.version.outputs.version }}.zip
          body: ${{ steps.changelog.outputs.body }}

      - name: Update update.xml (OTA)
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          ZIP="unisal_general-${VERSION}.zip"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP}"
          CHANGELOG_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          SHA256=$(sha256sum "$ZIP" | cut -d ' ' -f1)

          # Aggiorna <version>, <downloadurl>, <sha256sum> e <changelogurl> in tutti i blocchi <update> del file
          sed -i \
            -e "s#<version>[^<]*</version>#<version>${VERSION}</version>#g" \
            -e "s#<downloadurl type=\"full\" format=\"zip\">[^<]*</downloadurl>#<downloadurl type=\"full\" format=\"zip\">${DOWNLOAD_URL}</downloadurl>#g" \
            -e "s#<sha256sum>[^<]*</sha256sum>#<sha256sum>${SHA256}</sha256sum>#g" \
            -e "s#<changelogurl>[^<]*</changelogurl>#<changelogurl>${CHANGELOG_URL}</changelogurl>#g" \
            update.xml

      - name: Commit update.xml
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          if ! git diff --quiet -- update.xml; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add update.xml
            git commit -m "chore: aggiorna update.xml a ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin HEAD:main
          fi
